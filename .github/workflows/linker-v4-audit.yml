name: Monthly Link Audit

# Deterministic audit only — no LLM API.
# Full-site relinks with link generation run locally:
#   npx tsx scripts/automation -f linker-v4 -m relink-local

on:
  schedule:
    - cron: "15 13 1 * *"
  workflow_dispatch:

concurrency:
  group: linker-v4-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Semantic link audit (live blog links)
        run: npx tsx scripts/automation/index.ts -f linker-v4 -m semantic-audit --all

      - name: Link graph health
        run: npx tsx scripts/automation/index.ts -f linker-v4 -m graph || true

      - name: Anchor diversity report
        run: npx tsx scripts/automation/index.ts -f linker-v4 -m anchor-report || true

      - name: Upload audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: link-audit-${{ github.run_id }}
          path: internal-links-audit-report.md
          if-no-files-found: warn
