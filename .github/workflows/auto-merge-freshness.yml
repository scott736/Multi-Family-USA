name: Auto-merge freshness PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            AUTHOR="${{ github.event.pull_request.user.login }}"
            HEAD_REF="${{ github.event.pull_request.head.ref }}"

            if [ "$AUTHOR" != "cursor[bot]" ] && [[ ! "$HEAD_REF" =~ ^cursor/ ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [[ ! "$BRANCH" =~ ^cursor/ ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_NUM=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json number -q '.[0].number // empty')
            if [ -z "$PR_NUM" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge after checks pass
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          # --auto queues squash merge once required status checks pass
          if gh pr merge "$PR_NUM" --auto --squash 2>/dev/null; then
            echo "Auto-merge enabled for PR #$PR_NUM"
          elif gh pr view "$PR_NUM" --json autoMergeRequest -q '.autoMergeRequest.enabledAt // empty' | grep -q .; then
            echo "Auto-merge already enabled for PR #$PR_NUM"
          else
            echo "Could not enable auto-merge yet (checks may still be pending)"
          fi
